<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SolaX Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- Login view -->
  <section id="login-view" class="card hidden">
    <h1>☀️ SolaX</h1>
    <form id="login-form">
      <input id="username" name="username" placeholder="Username" autocomplete="username" required />
      <input id="password" name="password" type="password" placeholder="Password"
             autocomplete="current-password" required />
      <button type="submit">Sign in</button>
      <p id="login-error" class="error hidden">Invalid credentials</p>
    </form>
  </section>

  <!-- Dashboard view -->
  <main id="dash-view" class="hidden">
    <header>
      <h1>☀️ Solar generation</h1>
      <button id="logout" class="link">Log out</button>
    </header>

    <!-- Overall year-to-date comparison (always the current year) -->
    <section id="year-banner" class="banner">
      <span class="banner-title" id="year-title">This year so far</span>
      <span class="banner-body" id="year-body">–</span>
    </section>

    <!-- Month-contextual stat cards (filled by JS) -->
    <section class="cards" id="cards"></section>

    <section class="chart-wrap">
      <div class="chart-header">
        <button id="prev-month" class="link" title="Previous month">‹</button>
        <input type="month" id="month-picker" />
        <button id="next-month" class="link" title="Next month">›</button>
        <span class="spacer"></span>
        <div class="chart-toggle" role="group" aria-label="Chart type">
          <button data-type="line" class="active">Line</button>
          <button data-type="bar">Bar</button>
        </div>
      </div>
      <canvas id="month-chart"></canvas>
    </section>
  </main>

  <script src="/vendor/chart.umd.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
