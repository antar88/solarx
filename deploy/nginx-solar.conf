# solar.antarmf.com — static dashboard + reverse proxy to the FastAPI backend.
# Install: copy to /etc/nginx/sites-available/, symlink into sites-enabled/,
# `nginx -t && systemctl reload nginx`, then run certbot (see deploy/setup.sh).
server {
    listen 80;
    listen [::]:80;
    server_name solar.antarmf.com;

    root /var/www/antar88.github.io/apis/solarx/web;
    index index.html;

    # Static dashboard
    location / {
        try_files $uri $uri/ =404;
    }

    # API backend (localhost only)
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Security headers (HSTS added by certbot config / after TLS)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
